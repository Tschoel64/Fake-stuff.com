<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" src="https://raw.githubusercontent.com/Tschoel64/Fake-stuff.com/refs/heads/main/favicon.ico">
  <title>Fake Stuff List (currently)</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: Georgia, serif;
      color: #111;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      font-weight: normal;
      margin: 90px 0 8px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-bottom: 90px;
      font-style: italic;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 40px 32px;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .item img,
    .item .emoji {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      border-radius: 4px;
    }

    .caption {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      text-align: center;
      font-style: italic;
    }

    .img-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #f0f0f0;
      border: 2px dashed #ccc;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #aaa;
      text-align: center;
      border-radius: 4px;
      box-sizing: border-box;
      padding: 16px;
      line-height: 1.6;
    }

    .suggestion {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin: 50px 0 40px;
      font-style: italic;
    }

    .suggestion a {
      color: #111;
    }

    footer {
      text-align: center;
      font-size: 11px;
      color: #979797;
      padding: 32px;
      border-top: 1px solid #a5a5a5;
      margin-top: auto;
    }
  </style>
</head>
<body>

<h1 data-i18n="title">Fake Stuff List</h1>
<p class="subtitle" data-i18n="subtitle">A carefully selected list.</p>

<div class="grid">

  <div class="item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Skyline_der_Stadt_Bielefeld.jpg" alt="Bielefeld" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="caption" data-i18n="bielefeld">Bielefeld, Germany</div>
  </div>

  <div class="item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Duck-billed_platypus_%28Ornithorhynchus_anatinus%29_surfacing_Scottsdale.jpg/960px-Duck-billed_platypus_%28Ornithorhynchus_anatinus%29_surfacing_Scottsdale.jpg" alt="Schnabeltier" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="caption" data-i18n="platypus">The platypus</div>
  </div>

  <div class="item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Anguilla_anguilla.jpg/330px-Anguilla_anguilla.jpg" alt="Aal" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
         style="object-position: left">
    <div class="caption" data-i18n="eel">The Eel</div>
  </div>

  <div class="item">
    <div class="img-placeholder" style="display:flex" data-i18n="suggestion_placeholder">Your suggestion</div>
    <div class="caption" data-i18n="suggestion_caption">Your suggestion</div>
  </div>

</div>


<p class="suggestion">
  <span data-i18n="suggestion_text">If you have suggestions for more Fake Stuff, please send me an email:</span>
  <a href="mailto:Extra-Fake-Stuff@fake-stuff.com">Extra-Fake-Stuff@fake-stuff.com</a>
</p>


<footer>© 2026</footer>

<script>
  const translations = {
    en: {
      title:                "Fake Stuff List",
      subtitle:             "A carefully selected list.",
      bielefeld:            "Bielefeld, Germany",
      platypus:             "The platypus",
      eel:                  "The Eel",
      suggestion_placeholder: "Your suggestion",
      suggestion_caption:   "Your suggestion",
      suggestion_text:      "If you have suggestions for more Fake Stuff, please send me an email:"
    },
    de: {
      title:                "Fake Stuff Liste",
      subtitle:             "Eine sorgfältig ausgewählte Liste.",
      bielefeld:            "Bielefeld, Deutschland",
      platypus:             "Das Schnabeltier",
      eel:                  "Der Aal",
      suggestion_placeholder: "Dein Vorschlag",
      suggestion_caption:   "Dein Vorschlag",
      suggestion_text:      "Wenn du Vorschläge für mehr Fake Stuff hast, schreib mir eine E-Mail:"
    }
  };

  const lang = navigator.language.startsWith("de") ? "de" : "en";
  const t = translations[lang];

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key]) el.textContent = t[key];
  });

  document.documentElement.lang = lang;
  document.title = t.title;
</script>

</body>
</html>
