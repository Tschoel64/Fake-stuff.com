<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Stuff List (currently)</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: Georgia, serif;
      color: #111;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      font-weight: normal;
      margin: 90px 0 8px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-bottom: 90px;
      font-style: italic;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 40px 32px;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .item img,
    .item .emoji {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      border-radius: 4px;
    }

    .caption {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      text-align: center;
      font-style: italic;
    }

    .img-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #f0f0f0;
      border: 2px dashed #ccc;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #aaa;
      text-align: center;
      border-radius: 4px;
      box-sizing: border-box;
      padding: 16px;
      line-height: 1.6;
    }

    .suggestion {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin: 50px 0 40px;
      font-style: italic;
    }

    .suggestion a {
      color: #111;
    }

    footer {
      text-align: center;
      font-size: 11px;
      color: #979797;
      padding: 32px;
      border-top: 1px solid #a5a5a5;
      margin-top: auto;
    }
  </style>
</head>
<body>

<h1>Fake Stuff List (currently)</h1>
<p class="subtitle">A carefully selected list.</p>

<div class="grid">

  <div class="item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Skyline_der_Stadt_Bielefeld.jpg" alt="Bielefeld" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="caption">Bielefeld, Germany</div>
  </div>

  <div class="item">
    <img src="https://cdn.pixabay.com/photo/2018/06/14/19/22/duck-3475449_1280.jpg" alt="Schnabeltier" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="caption">The platypus</div>
  </div>

  <div class="item">
    <div class="img-placeholder" style="display:flex">Your suggestion</div>
    <div class="caption">Your suggestion</div>
  </div>

  <div class="item">
    <div class="img-placeholder" style="display:flex">Your suggestion</div>
    <div class="caption">Your suggestion</div>
  </div>

</div>

  
<p class="suggestion">If you have suggestions for more fake stuff, please send me an email: <a href="mailto:Extra-Fake-Stuff@fake-stuff.com">Extra-Fake-Stuff@fake-stuff.com</a></p>


<footer>© 2026</footer>


</body>
</html>
